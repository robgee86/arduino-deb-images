name: SBOM Comparison (main vs arduino)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC

# implicitly set all other permissions to none
permissions:
  contents: read

jobs:
  compare-sboms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v3
        with:
          ref: main
